<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronix iOS Global</title>

<style>
:root{
  --bg:#040713;
  --glass:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.15);
  --primary:#6366f1;
  --accent:#a855f7;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 10%, rgba(99,102,241,.35), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(168,85,247,.25), transparent 40%),
    var(--bg);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 18px;
  color:var(--text);
  overflow:hidden;
}

/* Floating background animation */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);
  top:-200px;
  left:-200px;
  animation:floatBg 12s infinite alternate ease-in-out;
}
@keyframes floatBg{
  from{transform:translate(0,0);}
  to{transform:translate(100px,60px);}
}

/* Loader */
#loader{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:.6s;
}
.spinner{
  width:45px;
  height:45px;
  border:3px solid transparent;
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loaded #loader{opacity:0;visibility:hidden;}

/* Install overlay */
#install-overlay{
  position:fixed;
  inset:0;
  background:rgba(4,7,19,.85);
  backdrop-filter:blur(14px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9000;
}
#install-overlay.active{opacity:1;visibility:visible;}
.install-text{
  margin-top:18px;
  letter-spacing:.12em;
  font-size:.85rem;
  color:var(--text);
}

/* Card */
.card{
  width:100%;
  max-width:540px;
  background:var(--glass);
  backdrop-filter:blur(28px);
  border-radius:32px;
  padding:50px 28px;
  border:1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05),
    0 40px 80px rgba(0,0,0,.6);
  text-align:center;
  position:relative;
  animation:floatCard 6s ease-in-out infinite alternate;
  opacity:0;
  transform:translateY(40px);
  transition:1s cubic-bezier(.16,1,.3,1);
}
.loaded .card{opacity:1;transform:translateY(0);}
@keyframes floatCard{
  from{transform:translateY(0);}
  to{transform:translateY(-12px);}
}

/* Logo */
.logo-wrap{
  position:relative;
  margin-bottom:30px;
}
.logo-glow{
  position:absolute;
  inset:-15px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  filter:blur(30px);
  opacity:.4;
  border-radius:40px;
}
.logo{
  width:120px;
  height:120px;
  border-radius:32px;
  border:1px solid rgba(255,255,255,.2);
  object-fit:cover;
  position:relative;
}

/* Title */
h1{
  font-size:2.2rem;
  font-weight:700;
  margin-bottom:8px;
  background:linear-gradient(90deg,#fff,#c7d2fe,#f0abfc,#fff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}
@keyframes shine{
  to{background-position:200% center;}
}
.subtitle{
  font-size:.75rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:35px;
}

/* Grid */
.grid{
  display:grid;
  gap:16px;
}
@media(min-width:450px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

/* Buttons */
.install-btn{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  cursor:pointer;
  transition:.35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.install-btn:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 15px 35px rgba(99,102,241,.35);
  border-color:var(--primary);
}
.install-btn:active{transform:scale(.95);}

.btn-id{
  font-size:10px;
  font-family:monospace;
  letter-spacing:.15em;
  color:var(--primary);
  opacity:.8;
}
.btn-label{
  margin-top:6px;
  font-size:1rem;
  font-weight:600;
}

/* Footer */
.footer{
  margin-top:45px;
  font-size:10px;
  letter-spacing:.2em;
  color:var(--muted);
  opacity:.6;
}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="install-overlay">
  <div class="spinner"></div>
  <div class="install-text">REQUESTING INSTALLATION</div>
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png">
  </div>

  <h1>Ronix iOS Global</h1>
  <div class="subtitle">Enterprise Installation Portal</div>

  <div class="grid">
    <div class="install-btn" data-file="Commission.plist"><div class="btn-id">REF_01</div><div class="btn-label">Commission</div></div>
    <div class="install-btn" data-file="Forevermark.plist"><div class="btn-id">REF_02</div><div class="btn-label">Forevermark</div></div>
    <div class="install-btn" data-file="PowerChina.plist"><div class="btn-id">REF_03</div><div class="btn-label">PowerChina</div></div>
    <div class="install-btn" data-file="Qingdao.plist"><div class="btn-id">REF_04</div><div class="btn-label">Qingdao</div></div>
    <div class="install-btn" data-file="Railway.plist"><div class="btn-id">REF_05</div><div class="btn-label">Railway</div></div>
    <div class="install-btn" data-file="Takeoff.plist"><div class="btn-id">REF_06</div><div class="btn-label">Takeoff</div></div>
    <div class="install-btn" data-file="Telecom.plist"><div class="btn-id">REF_07</div><div class="btn-label">Telecom</div></div>
    <div class="install-btn" data-file="Tianjin.plist"><div class="btn-id">REF_08</div><div class="btn-label">Tianjin</div></div>
  </div>

  <div class="footer">RONIX GLOBAL INSTALL SYSTEM</div>
</div>

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>document.body.classList.add("loaded"),500);
});

const overlay=document.getElementById("install-overlay");

document.querySelectorAll(".install-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    overlay.classList.add("active");
    const file=btn.dataset.file;
    const url=`itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/main/${file}`;
    setTimeout(()=>{
      window.location.href=url;
      setTimeout(()=>overlay.classList.remove("active"),3000);
    },250);
  });
});
</script>

</body>
</html>
