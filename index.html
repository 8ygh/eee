<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronix iOS Global</title>

<style>
:root{
  --glass: rgba(25, 15, 42, 0.72);
  --border: rgba(255,255,255,0.18);
  --primary: #8b5cf6;
  --text: #f8fafc;
  --muted: #c4b5fd;
  --nebula: radial-gradient(circle at center, #3b0a6d 0%, #1a042f 80%);
}

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}

body{
  min-height:100vh;
  background:#01010f;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:70px 18px;
  overflow-x:hidden;
  position:relative;
}

/* ===== CANVAS BACKGROUND ===== */

#starfield{
  position:fixed;
  inset:0;
  z-index:-3;
  background:var(--nebula);
}

.ripple-layer{
  position:fixed;
  inset:0;
  z-index:-2;
  background: radial-gradient(circle at center, rgba(139,92,246,0.08), transparent 80%);
  animation:rippleMove 10s infinite alternate ease-in-out;
  pointer-events:none;
}

@keyframes rippleMove{
  0%{transform:scale(1);}
  100%{transform:scale(1.2);}
}

/* ===== CARD ===== */

.card{
  width:100%;
  max-width:540px;
  background:rgba(20, 10, 45, 0.8);
  backdrop-filter:blur(40px) saturate(140%);
  -webkit-backdrop-filter:blur(40px) saturate(140%);
  border-radius:34px;
  padding:55px 30px;
  border:1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04),
    0 40px 90px rgba(75,0,130,.55);
  text-align:center;
}

/* Logo */
.logo{
  width:130px;
  height:130px;
  border-radius:32px;
  margin-bottom:28px;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 0 45px rgba(139,92,246,.7);
}

/* Title */
h1{
  font-size:2.1rem;
  margin-bottom:10px;
  background:linear-gradient(90deg,#c084fc,#8b5cf6,#a78bfa,#c084fc);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  to{background-position:200% center;}
}

.subtitle{
  font-size:.75rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:40px;
}

/* Buttons */
.grid{
  display:grid;
  gap:18px;
}

.install-btn{
  padding:22px;
  border-radius:22px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:.35s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);
}

.install-btn:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(139,92,246,.5);
  border-color:var(--primary);
}

.install-btn:active{
  transform:scale(.95);
}

.btn-id{
  font-size:11px;
  font-family:monospace;
  letter-spacing:.18em;
  color:var(--primary);
  opacity:.85;
}

.btn-label{
  margin-top:8px;
  font-size:1.05rem;
  font-weight:600;
}

.footer{
  margin-top:50px;
  font-size:10px;
  letter-spacing:.25em;
  color:var(--muted);
  opacity:.6;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="ripple-layer"></div>

<div class="card">
  <img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png">

  <h1>Ronix iOS Global</h1>
  <div class="subtitle">Interstellar Installation Portal</div>

  <div class="grid">
    <div class="install-btn" data-file="Commission.plist"><div class="btn-id">REF_01</div><div class="btn-label">Commission</div></div>
    <div class="install-btn" data-file="Forevermark.plist"><div class="btn-id">REF_02</div><div class="btn-label">Forevermark</div></div>
    <div class="install-btn" data-file="PowerChina.plist"><div class="btn-id">REF_03</div><div class="btn-label">PowerChina</div></div>
    <div class="install-btn" data-file="Qingdao.plist"><div class="btn-id">REF_04</div><div class="btn-label">Qingdao</div></div>
    <div class="install-btn" data-file="Railway.plist"><div class="btn-id">REF_05</div><div class="btn-label">Railway</div></div>
    <div class="install-btn" data-file="Takeoff.plist"><div class="btn-id">REF_06</div><div class="btn-label">Takeoff</div></div>
    <div class="install-btn" data-file="Telecom.plist"><div class="btn-id">REF_07</div><div class="btn-label">Telecom</div></div>
    <div class="install-btn" data-file="Tianjin.plist"><div class="btn-id">REF_08</div><div class="btn-label">Tianjin</div></div>
  </div>

  <div class="footer">RONIX GLOBAL INSTALL SYSTEM</div>
</div>

<script>
/* ===== STARFIELD ===== */
const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5,
    a:Math.random(),
    s:Math.random()*0.02,
    color:`hsl(270, 80%, ${Math.random()*50+50}%)`
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(star=>{
    star.a+=star.s;
    if(star.a<=0||star.a>=1) star.s*=-1;

    ctx.beginPath();
    ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(270, 80%, 80%, ${star.a})`;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== SHOOTING STARS ===== */
function shootingStar(){
  const el=document.createElement("div");
  el.style.position="fixed";
  el.style.top="-120px";
  el.style.left=Math.random()*window.innerWidth+"px";
  el.style.width="2px";
  el.style.height="140px";
  el.style.background="linear-gradient(180deg, #c084fc, transparent)";
  el.style.transform="rotate(25deg)";
  el.style.opacity="0.9";
  el.style.zIndex="-1";
  el.style.transition="transform 4s linear, opacity 4s linear";
  document.body.appendChild(el);

  setTimeout(()=>{
    el.style.transform="translateY(120vh) rotate(25deg)";
    el.style.opacity="0";
  },100);

  setTimeout(()=>el.remove(),4000);
}

setInterval(()=>{
  if(Math.random()>0.5) shootingStar();
},4000);

/* ===== INSTALL BUTTONS ===== */
document.querySelectorAll(".install-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const file=btn.dataset.file;
    const url=`itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/main/${file}`;
    window.location.href=url;
  });
});
</script>

</body>
</html>
