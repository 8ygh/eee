<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronix iOS Global</title>

<style>
:root{
  --glass: rgba(15, 10, 30, 0.75);
  --border: rgba(255,255,255,0.18);
  --primary: #8b5cf6;
  --text: #f8fafc;
  --muted: #9f7aea;
  --nebula: radial-gradient(circle at center, #1b0a3b 0%, #0a0518 90%);
}

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}

body{
  min-height:100vh;
  background:#01000d;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:70px 18px;
  overflow-x:hidden;
  position:relative;
}

/* ===== CANVAS BACKGROUND ===== */
#starfield{
  position:fixed;
  inset:0;
  z-index:-3;
  background:var(--nebula);
}

.ripple-layer{
  position:fixed;
  inset:0;
  z-index:-2;
  background: radial-gradient(circle at center, rgba(139,92,246,0.05), transparent 80%);
  animation:rippleMove 20s infinite alternate ease-in-out;
  pointer-events:none;
}

@keyframes rippleMove{
  0%{transform:scale(1);}
  100%{transform:scale(1.3);}
}

/* ===== CARD ===== */
.card{
  width:100%;
  max-width:540px;
  background:rgba(20, 10, 35, 0.85);
  backdrop-filter:blur(40px) saturate(140%);
  -webkit-backdrop-filter:blur(40px) saturate(140%);
  border-radius:34px;
  padding:55px 30px;
  border:1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04),
    0 40px 120px rgba(75,0,130,.45);
  text-align:center;
  position:relative;
  z-index:1;
}

/* Logo */
.logo{
  width:130px;
  height:130px;
  border-radius:32px;
  margin-bottom:28px;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 0 60px rgba(139,92,246,.8);
}

/* Title */
h1{
  font-size:2.1rem;
  margin-bottom:10px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#8b5cf6,#7c3aed);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  to{background-position:200% center;}
}

.subtitle{
  font-size:.75rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:40px;
}

/* Buttons */
.grid{
  display:grid;
  gap:18px;
}

.install-btn{
  padding:22px;
  border-radius:22px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:.35s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);
}

.install-btn:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(139,92,246,.5);
  border-color:var(--primary);
}

.install-btn:active{
  transform:scale(.95);
}

.btn-id{
  font-size:11px;
  font-family:monospace;
  letter-spacing:.18em;
  color:var(--primary);
  opacity:.85;
}

.btn-label{
  margin-top:8px;
  font-size:1.05rem;
  font-weight:600;
}

.footer{
  margin-top:50px;
  font-size:10px;
  letter-spacing:.25em;
  color:var(--muted);
  opacity:.6;
}

/* ===== OVERLAY ===== */
#install-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(15px);
  z-index:50;
  display:none;
  overflow:hidden;
}

#overlay-canvas{
  position:absolute;
  inset:0;
  z-index:51;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="ripple-layer"></div>

<div class="card">
  <img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png">
  <h1>Ronix iOS Global</h1>
  <div class="subtitle">Interstellar Installation Portal</div>

  <div class="grid">
    <div class="install-btn" data-file="Commission.plist"><div class="btn-id">REF_01</div><div class="btn-label">Commission</div></div>
    <div class="install-btn" data-file="Forevermark.plist"><div class="btn-id">REF_02</div><div class="btn-label">Forevermark</div></div>
    <div class="install-btn" data-file="PowerChina.plist"><div class="btn-id">REF_03</div><div class="btn-label">PowerChina</div></div>
    <div class="install-btn" data-file="Qingdao.plist"><div class="btn-id">REF_04</div><div class="btn-label">Qingdao</div></div>
    <div class="install-btn" data-file="Railway.plist"><div class="btn-id">REF_05</div><div class="btn-label">Railway</div></div>
    <div class="install-btn" data-file="Takeoff.plist"><div class="btn-id">REF_06</div><div class="btn-label">Takeoff</div></div>
    <div class="install-btn" data-file="Telecom.plist"><div class="btn-id">REF_07</div><div class="btn-label">Telecom</div></div>
    <div class="install-btn" data-file="Tianjin.plist"><div class="btn-id">REF_08</div><div class="btn-label">Tianjin</div></div>
  </div>

  <div class="footer">RONIX GLOBAL INSTALL SYSTEM</div>
</div>

<!-- Overlay for install -->
<div id="install-overlay">
  <canvas id="overlay-canvas"></canvas>
</div>

<script>
/* ===== STARFIELD ===== */
const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");
function resize(){canvas.width = window.innerWidth; canvas.height = window.innerHeight;}
resize(); window.addEventListener("resize", resize);

let stars = [];
for(let i=0;i<500;i++){ // more stars for depth
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5,
    a:Math.random(),
    s:Math.random()*0.02
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(star=>{
    star.a += star.s;
    if(star.a <=0 || star.a >=1) star.s *= -1;
    ctx.beginPath();
    ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
    ctx.fillStyle = `hsla(270,80%,80%,${star.a})`;
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== INSTALL OVERLAY ===== */
const installOverlay = document.getElementById('install-overlay');
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d');

function resizeOverlay(){overlayCanvas.width = window.innerWidth; overlayCanvas.height = window.innerHeight;}
resizeOverlay(); window.addEventListener("resize", resizeOverlay);

let overlayStars = [];
let overlayClouds = [];

function createOverlayElements(){
  overlayStars = [];
  overlayClouds = [];
  // More stars, slower, longer fall
  for(let i=0;i<300;i++){
    overlayStars.push({
      x: Math.random()*overlayCanvas.width,
      y: Math.random()*overlayCanvas.height,
      r: 0.5 + Math.random()*1.5,
      a: Math.random(),
      s: 0.003 + Math.random()*0.005,
      fall: 0.2 + Math.random()*0.3
    });
  }
  // More clouds
  for(let i=0;i<5;i++){
    overlayClouds.push({
      x: Math.random()*overlayCanvas.width,
      y: Math.random()*overlayCanvas.height/2,
      r: overlayCanvas.width*0.7,
      a:0.03 + Math.random()*0.07,
      dx:0.05 + Math.random()*0.1,
      dy:0.02 + Math.random()*0.05
    });
  }
}

let overlayAnimating = false;
function animateOverlay(){
  if(!overlayAnimating) return;
  overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  // Clouds
  overlayClouds.forEach(c=>{
    overlayCtx.beginPath();
    let grad = overlayCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    grad.addColorStop(0, `rgba(139,92,246,${c.a})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    overlayCtx.fillStyle = grad;
    overlayCtx.fill();
    c.x += c.dx;
    c.y += c.dy;
    if(c.x-c.r>overlayCanvas.width) c.x=-c.r;
    if(c.y-c.r>overlayCanvas.height) c.y=-c.r/2;
  });
  // Stars
  overlayStars.forEach(star=>{
    star.a += star.s;
    if(star.a <=0 || star.a >=1) star.s *= -1;
    star.y += star.fall;
    if(star.y>overlayCanvas.height) star.y=-2;
    overlayCtx.beginPath();
    overlayCtx.arc(star.x, star.y, star.r,0,Math.PI*2);
    overlayCtx.fillStyle=`hsla(270,80%,80%,${star.a})`;
    overlayCtx.fill();
  });
  requestAnimationFrame(animateOverlay);
}

// Install button click
document.querySelectorAll(".install-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    installOverlay.style.display="block";
    createOverlayElements();
    overlayAnimating = true;
    animateOverlay();
    const file = btn.dataset.file;
    // iOS install link
    window.location.href=`itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/main/${file}`;
    // Overlay auto-hide after 6s
    setTimeout(()=>{overlayAnimating=false; installOverlay.style.display="none";},6000);
  });
});
</script>
</body>
</html>
