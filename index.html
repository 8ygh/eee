<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronix iOS Global</title>

<style>
:root{
  --bg:#020617;
  --glass:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.15);
  --primary:#7c3aed;
  --accent:#6366f1;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:60px 18px;
  position:relative;
  overflow-x:hidden; /* allow vertical scroll */
}

/* ---------- STARFIELD BACKGROUND ---------- */

.stars{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 70% 80%, white, transparent),
    radial-gradient(1px 1px at 40% 60%, white, transparent),
    radial-gradient(2px 2px at 90% 20%, white, transparent),
    radial-gradient(1.5px 1.5px at 10% 70%, white, transparent);
  animation:twinkle 6s infinite alternate ease-in-out;
}

@keyframes twinkle{
  from{opacity:.6;}
  to{opacity:1;}
}

/* Shooting stars */
.shooting-star{
  position:fixed;
  top:-10px;
  width:2px;
  height:120px;
  background:linear-gradient(white, transparent);
  opacity:.7;
  transform:rotate(20deg);
  animation:fall linear infinite;
  z-index:-1;
}

.shooting-star:nth-child(1){
  left:15%;
  animation-duration:8s;
  animation-delay:2s;
}

.shooting-star:nth-child(2){
  left:70%;
  animation-duration:10s;
  animation-delay:5s;
}

.shooting-star:nth-child(3){
  left:45%;
  animation-duration:12s;
  animation-delay:8s;
}

@keyframes fall{
  0%{transform:translateY(-150px) rotate(20deg); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(110vh) rotate(20deg); opacity:0;}
}

/* ---------- CARD ---------- */

.card{
  width:100%;
  max-width:540px;
  background:var(--glass);
  backdrop-filter:blur(30px);
  border-radius:32px;
  padding:50px 28px;
  border:1px solid var(--border);
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  text-align:center;
  position:relative;
}

.logo{
  width:120px;
  height:120px;
  border-radius:30px;
  margin-bottom:25px;
  border:1px solid rgba(255,255,255,.2);
}

h1{
  font-size:2rem;
  margin-bottom:8px;
  background:linear-gradient(90deg,#fff,#c7d2fe,#a5b4fc,#fff);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  to{background-position:200% center;}
}

.subtitle{
  font-size:.75rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:35px;
}

/* Buttons */

.grid{
  display:grid;
  gap:16px;
}

@media(min-width:450px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

.install-btn{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  cursor:pointer;
  transition:.3s ease;
}

.install-btn:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(124,58,237,.4);
  border-color:var(--primary);
}

.install-btn:active{
  transform:scale(.95);
}

.btn-id{
  font-size:10px;
  font-family:monospace;
  letter-spacing:.15em;
  color:var(--primary);
  opacity:.8;
}

.btn-label{
  margin-top:6px;
  font-size:1rem;
  font-weight:600;
}

.footer{
  margin-top:45px;
  font-size:10px;
  letter-spacing:.2em;
  color:var(--muted);
  opacity:.6;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="card">
  <img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png">

  <h1>Ronix iOS Global</h1>
  <div class="subtitle">Interstellar Installation Portal</div>

  <div class="grid">
    <div class="install-btn" data-file="Commission.plist"><div class="btn-id">REF_01</div><div class="btn-label">Commission</div></div>
    <div class="install-btn" data-file="Forevermark.plist"><div class="btn-id">REF_02</div><div class="btn-label">Forevermark</div></div>
    <div class="install-btn" data-file="PowerChina.plist"><div class="btn-id">REF_03</div><div class="btn-label">PowerChina</div></div>
    <div class="install-btn" data-file="Qingdao.plist"><div class="btn-id">REF_04</div><div class="btn-label">Qingdao</div></div>
    <div class="install-btn" data-file="Railway.plist"><div class="btn-id">REF_05</div><div class="btn-label">Railway</div></div>
    <div class="install-btn" data-file="Takeoff.plist"><div class="btn-id">REF_06</div><div class="btn-label">Takeoff</div></div>
    <div class="install-btn" data-file="Telecom.plist"><div class="btn-id">REF_07</div><div class="btn-label">Telecom</div></div>
    <div class="install-btn" data-file="Tianjin.plist"><div class="btn-id">REF_08</div><div class="btn-label">Tianjin</div></div>
  </div>

  <div class="footer">RONIX GLOBAL INSTALL SYSTEM</div>
</div>

<script>
document.querySelectorAll(".install-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const file=btn.dataset.file;
    const url=`itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/main/${file}`;
    window.location.href=url;
  });
});
</script>

</body>
</html>
