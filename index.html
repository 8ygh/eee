<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronix iOS Direct Installs</title>

<style>
:root{
    --bg:#050816;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.12);
    --primary:#6366f1;
    --accent:#a855f7;
    --text:#f1f5f9;
    --muted:#64748b;
}

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at 20% 0%, rgba(99,102,241,0.25), transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(168,85,247,0.2), transparent 50%),
        var(--bg);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:30px 16px;
    color:var(--text);
    overflow-x:hidden;
}

/* Loader */
#loader{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:.6s ease;
}

.spinner{
    width:42px;
    height:42px;
    border:3px solid transparent;
    border-top-color:var(--primary);
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.loaded #loader{
    opacity:0;
    visibility:hidden;
}

/* Install Overlay */
#install-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,8,22,.85);
    backdrop-filter:blur(12px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:.3s ease;
    z-index:9000;
}

#install-overlay.active{
    opacity:1;
    visibility:visible;
}

.install-text{
    margin-top:16px;
    font-size:.9rem;
    letter-spacing:.08em;
    color:var(--text);
}

/* Card */
.card{
    width:100%;
    max-width:520px;
    background:var(--card);
    backdrop-filter:blur(20px);
    border-radius:28px;
    padding:40px 24px;
    text-align:center;
    border:1px solid var(--border);
    box-shadow:0 30px 60px rgba(0,0,0,.5);
    opacity:0;
    transform:translateY(30px);
    transition:1s cubic-bezier(.16,1,.3,1);
}

.loaded .card{
    opacity:1;
    transform:translateY(0);
}

/* Logo */
.logo-wrapper{
    position:relative;
    margin-bottom:24px;
}

.logo-glow{
    position:absolute;
    inset:-10px;
    border-radius:30px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    filter:blur(20px);
    opacity:.35;
    animation:pulse 3s infinite alternate;
}

@keyframes pulse{
    from{transform:scale(.95);}
    to{transform:scale(1.1);}
}

.logo{
    position:relative;
    width:110px;
    height:110px;
    border-radius:30px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.15);
}

/* Text */
h1{
    font-size:1.9rem;
    margin-bottom:6px;
    background:linear-gradient(to bottom,#fff,#94a3b8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:.75rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.2em;
    margin-bottom:30px;
}

/* Grid */
.grid{
    display:grid;
    gap:14px;
}

@media(min-width:420px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

/* Buttons */
.install-btn{
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:.3s cubic-bezier(.34,1.56,.64,1);
}

.install-btn:hover{
    transform:translateY(-3px);
    border-color:var(--primary);
}

.install-btn:active{
    transform:scale(.95);
}

.btn-id{
    font-size:10px;
    color:var(--primary);
    font-family:monospace;
    letter-spacing:.12em;
    opacity:.8;
}

.btn-label{
    margin-top:4px;
    font-weight:600;
    font-size:.95rem;
}

/* Ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.5) 0%,transparent 70%);
    transform:scale(0);
    animation:ripple .6s ease-out forwards;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

.footer{
    margin-top:40px;
    font-size:10px;
    letter-spacing:.15em;
    color:var(--muted);
    opacity:.6;
}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="install-overlay">
    <div class="spinner"></div>
    <div class="install-text">Requesting Installation...</div>
</div>

<div class="card">
    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png" alt="Ronix Logo">
    </div>

    <h1>Ronix iOS Global</h1>
    <p class="subtitle">Direct Installation Portal</p>

    <div class="grid">
        <div class="install-btn" data-url="Commission.plist">
            <div class="btn-id">REF_01</div>
            <div class="btn-label">Commission</div>
        </div>
        <div class="install-btn" data-url="Forevermark.plist">
            <div class="btn-id">REF_02</div>
            <div class="btn-label">Forevermark</div>
        </div>
        <div class="install-btn" data-url="PowerChina.plist">
            <div class="btn-id">REF_03</div>
            <div class="btn-label">PowerChina</div>
        </div>
        <div class="install-btn" data-url="Qingdao.plist">
            <div class="btn-id">REF_04</div>
            <div class="btn-label">Qingdao</div>
        </div>
        <div class="install-btn" data-url="Railway.plist">
            <div class="btn-id">REF_05</div>
            <div class="btn-label">Railway</div>
        </div>
        <div class="install-btn" data-url="Takeoff.plist">
            <div class="btn-id">REF_06</div>
            <div class="btn-label">Takeoff</div>
        </div>
        <div class="install-btn" data-url="Telecom.plist">
            <div class="btn-id">REF_07</div>
            <div class="btn-label">Telecom</div>
        </div>
        <div class="install-btn" data-url="Tianjin.plist">
            <div class="btn-id">REF_08</div>
            <div class="btn-label">Tianjin</div>
        </div>
    </div>

    <div class="footer">
        RONIX DIRECT INSTALLATION
    </div>
</div>

<script>
window.addEventListener("load",()=>{
    setTimeout(()=>document.body.classList.add("loaded"),400);
});

const overlay=document.getElementById("install-overlay");

document.querySelectorAll(".install-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
        e.preventDefault();

        const rect=btn.getBoundingClientRect();
        const ripple=document.createElement("span");
        ripple.className="ripple";
        ripple.style.width=ripple.style.height=Math.max(rect.width,rect.height)*2+"px";
        ripple.style.left=e.clientX-rect.left+"px";
        ripple.style.top=e.clientY-rect.top+"px";
        btn.appendChild(ripple);
        ripple.addEventListener("animationend",()=>ripple.remove());

        overlay.classList.add("active");

        const file=btn.dataset.url;
        const fullURL=`itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/main/${file}`;

        setTimeout(()=>{
            window.location.href=fullURL;
            setTimeout(()=>overlay.classList.remove("active"),3000);
        },200);
    });
});
</script>

</body>
</html>
